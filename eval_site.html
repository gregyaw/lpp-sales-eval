<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawn Pro Partners — Evaluations</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.header{background:#1e4d2b;color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.header h1{font-size:1.05rem;font-weight:500}
.header .logo{font-size:.7rem;opacity:.7;letter-spacing:.05em}
.hbtns{display:flex;gap:.5rem}
.hbtn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.12)}
.hbtn.active{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.7)}
.container{max-width:780px;margin:0 auto;padding:1.5rem 1rem 4rem}
.toggle-bar{display:flex;background:#fff;border-radius:10px;border:.5px solid #ddd;overflow:hidden;margin-bottom:1.5rem}
.toggle-btn{flex:1;padding:.7rem;text-align:center;cursor:pointer;font-size:.88rem;color:#555;border:none;background:transparent;transition:all .2s}
.toggle-btn.active{background:#1e4d2b;color:#fff;font-weight:500}
.card{background:#fff;border-radius:12px;border:.5px solid #ddd;padding:1.5rem;margin-bottom:1rem}
.section-title{font-size:.75rem;font-weight:600;letter-spacing:.08em;color:#1e4d2b;text-transform:uppercase;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1.5px solid #1e4d2b}
.field-group{margin-bottom:1rem}
label{display:block;font-size:.84rem;color:#444;margin-bottom:.35rem;font-weight:500}
input[type=text],textarea,select{width:100%;padding:.55rem .75rem;border:.5px solid #ccc;border-radius:7px;font-size:.9rem;font-family:inherit;color:#1a1a1a;background:#fff;outline:none}
input[type=text]:focus,textarea:focus{border-color:#1e4d2b;box-shadow:0 0 0 3px rgba(30,77,43,.1)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.rating-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.rating-row span{font-size:.8rem;color:#666;margin-right:.25rem}
.rating-btn{width:44px;height:44px;border-radius:8px;border:.5px solid #ccc;background:#fff;cursor:pointer;font-size:.95rem;font-weight:500;color:#444;transition:all .15s}
.rating-btn:hover{border-color:#1e4d2b;color:#1e4d2b}
.rating-btn.selected{background:#1e4d2b;color:#fff;border-color:#1e4d2b}
.rating-label{font-size:.75rem;color:#888;margin-top:.4rem;min-height:1rem}
.outcome-row{display:flex;gap:.6rem;flex-wrap:wrap}
.outcome-btn{padding:.45rem 1rem;border-radius:7px;border:.5px solid #ccc;background:#fff;cursor:pointer;font-size:.84rem;color:#444;transition:all .15s}
.outcome-btn:hover{border-color:#1e4d2b}
.outcome-btn.selected{background:#1e4d2b;color:#fff;border-color:#1e4d2b}
.yes-no-row{display:flex;gap:.6rem}
.submit-btn{width:100%;padding:.85rem;background:#1e4d2b;color:#fff;border:none;border-radius:9px;font-size:1rem;font-weight:500;cursor:pointer;margin-top:.5rem}
.submit-btn:hover{opacity:.88}
.checklist{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem}
.checklist li{font-size:.84rem;color:#555;padding:.25rem 0 .25rem .75rem;border-bottom:.5px solid #f0f0f0;list-style:none;position:relative}
.checklist li::before{content:'•';position:absolute;left:0;color:#1e4d2b}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:500px){.two-col{grid-template-columns:1fr}}
.success-screen{text-align:center;padding:3rem 1rem}
.success-icon{width:56px;height:56px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.5rem;color:#1e4d2b}
.success-screen h2{color:#1e4d2b;font-size:1.2rem;margin-bottom:.5rem}
.success-screen p{color:#666;font-size:.88rem;margin-bottom:1.5rem}
.back-btn{background:#fff;border:.5px solid #ccc;color:#444;padding:.6rem 1.4rem;border-radius:7px;cursor:pointer;font-size:.88rem}
.back-btn:hover{border-color:#1e4d2b;color:#1e4d2b}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:2rem;width:min(420px,94vw)}
.modal h2{font-size:1rem;font-weight:600;margin-bottom:1.25rem}
.modal-close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#999;margin-top:-4px}
.error-msg{font-size:.78rem;color:#c0392b;margin-top:.3rem}
.hidden{display:none!important}
.sending-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:1rem}
.spinner{width:34px;height:34px;border:3px solid #ddd;border-top-color:#1e4d2b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Submissions list */
.sub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.sub-header h2{font-size:1rem;font-weight:500;color:#1a1a1a}
.filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{padding:.35rem .9rem;border-radius:20px;border:.5px solid #ccc;background:#fff;cursor:pointer;font-size:.8rem;color:#555}
.filter-btn.active{background:#1e4d2b;color:#fff;border-color:#1e4d2b}
.sub-card{background:#fff;border-radius:10px;border:.5px solid #ddd;padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.sub-card:hover{border-color:#aac8b2}
.sub-info{flex:1;min-width:0}
.sub-name{font-size:.92rem;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-meta{font-size:.78rem;color:#888;margin-top:.2rem}
.sub-badge{font-size:.72rem;padding:.25rem .7rem;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-rep{background:#e8f5e9;color:#1e4d2b}
.badge-mg{background:#e8eaf6;color:#303f9f}
.sub-actions{display:flex;gap:.5rem}
.icon-btn{padding:.4rem .85rem;border-radius:6px;border:.5px solid #ccc;background:#fff;cursor:pointer;font-size:.78rem;color:#444;white-space:nowrap}
.icon-btn:hover{border-color:#1e4d2b;color:#1e4d2b}
.icon-btn.danger:hover{border-color:#c0392b;color:#c0392b}
.empty-state{text-align:center;padding:3rem 1rem;color:#999;font-size:.9rem}
/* Detail view */
.detail-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.back-arrow{background:none;border:none;cursor:pointer;font-size:1.1rem;color:#555;padding:.25rem}
.detail-header h2{font-size:1rem;font-weight:500}
.detail-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:.5px solid #f0f0f0;font-size:.87rem;gap:1rem}
.detail-row:last-child{border-bottom:none}
.detail-key{color:#888;flex-shrink:0}
.detail-val{color:#1a1a1a;text-align:right;font-weight:500}
.score-pill{display:inline-flex;align-items:center;gap:.4rem;background:#f0faf3;border-radius:6px;padding:.2rem .6rem;font-size:.82rem;color:#1e4d2b;font-weight:500}
.detail-text{font-size:.86rem;color:#333;line-height:1.6;padding:.4rem 0}
/* PDF print styles */
@media print{
  .header,.hbtns,.sub-actions,.back-arrow,.filter-row,.submit-btn,.toggle-bar,.back-btn{display:none!important}
  body{background:#fff}
  .card{border:1px solid #ccc;box-shadow:none;break-inside:avoid}
  .container{padding:0}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">LAWN PRO PARTNERS</div>
    <h1>Sales Call Evaluation</h1>
  </div>
  <div class="hbtns">
    <button class="hbtn active" id="navForm" onclick="showPage('form')">New Form</button>
    <button class="hbtn" id="navSubs" onclick="requireAdmin('subs')">Submissions</button>
    <button class="hbtn" id="navAdmin" onclick="openAdmin()">Admin</button>
  </div>
</div>

<div class="container">
  <!-- FORM PAGE -->
  <div id="pageForm">
    <div id="formView">
      <div class="toggle-bar">
        <button class="toggle-btn active" id="repTab" onclick="switchForm('rep')">Rep self-evaluation</button>
        <button class="toggle-btn" id="mgTab" onclick="switchForm('manager')">Manager scorecard</button>
      </div>
      <div id="repForm"></div>
      <div id="mgForm" class="hidden"></div>
    </div>
    <div id="successView" class="hidden">
      <div class="card success-screen">
        <div class="success-icon">✓</div>
        <h2>Evaluation submitted</h2>
        <p>Your form has been saved successfully.</p>
        <button class="back-btn" onclick="resetAndNew()">Submit another</button>
      </div>
    </div>
  </div>

  <!-- SUBMISSIONS LIST PAGE -->
  <div id="pageSubs" class="hidden">
    <div class="sub-header">
      <h2>Submitted evaluations</h2>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterSubs('all',this)">All</button>
      <button class="filter-btn" onclick="filterSubs('rep',this)">Rep self-evals</button>
      <button class="filter-btn" onclick="filterSubs('manager',this)">Manager scorecards</button>
    </div>
    <div id="subsList"></div>
  </div>

  <!-- DETAIL PAGE -->
  <div id="pageDetail" class="hidden">
    <div class="detail-header">
      <button class="back-arrow" onclick="showPage('subs')">&#8592;</button>
      <h2 id="detailTitle">Evaluation detail</h2>
    </div>
    <div id="detailBody"></div>
    <div style="display:flex;gap:.75rem;margin-top:1rem">
      <button class="submit-btn" style="background:#1e4d2b" onclick="downloadPDF()">Download PDF</button>
      <button class="back-btn" style="flex:1;text-align:center" onclick="showPage('subs')">Back to list</button>
    </div>
  </div>
</div>

<div id="sendingOverlay" class="hidden sending-overlay">
  <div class="spinner"></div>
  <div style="font-size:.88rem;color:#555">Saving evaluation...</div>
</div>

<!-- Admin modal -->
<div id="adminModal" class="hidden modal-bg">
  <div class="modal">
    <button class="modal-close" onclick="closeAdmin()">&#10005;</button>
    <h2>Admin</h2>
    <div id="adminLoginSection">
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="adminPwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')checkAdminPw()">
        <div class="error-msg hidden" id="adminPwError">Incorrect password</div>
      </div>
      <button class="submit-btn" onclick="checkAdminPw()">Log in</button>
    </div>
    <div id="adminSettingsSection" class="hidden">
      <div class="field-group">
        <label>Submission email address</label>
        <input type="text" id="adminEmailInput" placeholder="email@example.com">
        <div class="error-msg hidden" id="adminEmailError">Enter a valid email</div>
      </div>
      <div class="field-group">
        <label>Change admin password <span style="font-size:.74rem;color:#999">(leave blank to keep current)</span></label>
        <input type="password" id="adminNewPw" placeholder="New password">
      </div>
      <button class="submit-btn" onclick="saveAdminSettings()">Save settings</button>
      <div id="adminSaveMsg" class="hidden" style="color:#1e4d2b;font-size:.82rem;margin-top:.6rem;text-align:center">Settings saved!</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const DEFAULT_EMAIL='gregyaw@lawnpropartners.com', DEFAULT_PW='LawnPro2024!';
let settings={email:DEFAULT_EMAIL,pw:DEFAULT_PW};
let adminUnlocked=false;
let currentFilter='all';
let currentDetailId=null;
try{const s=localStorage.getItem('lpp_settings');if(s)settings=JSON.parse(s);}catch(e){}

function saveSettings(){try{localStorage.setItem('lpp_settings',JSON.stringify(settings));}catch(e){}}

function loadSubmissions(){
  try{const d=localStorage.getItem('lpp_submissions');return d?JSON.parse(d):[];}catch(e){return[];}
}
function saveSubmissions(arr){
  try{localStorage.setItem('lpp_submissions',JSON.stringify(arr));}catch(e){}
}

const RL=['Rarely','Occasionally','Sometimes','Mostly','Always'];
let currentForm='rep';
const repState={name:'',date:'',callType:'',discovery:0,presentation:0,softCloses:0,askedOrder:0,objHandling:0,outcome1:'',outcome2:'',didWell:'',doDiff:'',didAsk:'',ifNo:'',commitment:''};
const mgState={mgrName:'',brand:'',weekOf:'',repName:'',dateSubmit:'',call1type:'',call2type:'',discovery:0,presentation:0,softCloses:0,askedOrder:0,objHandling:0,outcome1:'',outcome2:'',didWell:'',improve:'',coachingActions:''};

function ratingBlock(fid,s,key){
  const btns=[1,2,3,4,5].map(n=>`<button class="rating-btn${s[key]===n?' selected':''}" onclick="${fid}State.${key}=${n};render${fid==='rep'?'Rep':'Mg'}()">${n}</button>`).join('');
  return `<div class="rating-row"><span>Rate:</span>${btns}</div><div class="rating-label">${s[key]?RL[s[key]-1]+' demonstrated':''}</div>`;
}
function outcomeRow(fid,s,num){
  const k='outcome'+num;
  return ['Sale','No Sale','Follow-Up Needed'].map(o=>`<button class="outcome-btn${s[k]===o?' selected':''}" onclick="${fid}State.${k}='${o}';render${fid==='rep'?'Rep':'Mg'}()">${o}</button>`).join('');
}

function renderRep(){
  const s=repState;
  document.getElementById('repForm').innerHTML=`<div class="card"><div class="section-title">Rep information</div>
  <div class="two-col">
    <div class="field-group"><label>Rep name</label><input type="text" value="${s.name}" oninput="repState.name=this.value" placeholder="Full name"></div>
    <div class="field-group"><label>Date</label><input type="text" value="${s.date}" oninput="repState.date=this.value" placeholder="MM/DD/YYYY"></div>
  </div>
  <div class="field-group"><label>Call type</label><div class="outcome-row">
    <button class="outcome-btn${s.callType==='Inbound'?' selected':''}" onclick="repState.callType='Inbound';renderRep()">Inbound</button>
    <button class="outcome-btn${s.callType==='Outbound'?' selected':''}" onclick="repState.callType='Outbound';renderRep()">Outbound</button>
  </div></div></div>

  <div class="card"><div class="section-title">Discovery</div>
  <ul class="checklist"><li>I asked the required 4 discovery questions</li><li>I uncovered the buyer's lawn issues and how they "feel" about their situation</li><li>I uncovered what they want fixed/improved</li><li>I confirmed my understanding before presenting</li></ul>
  ${ratingBlock('rep',s,'discovery')}</div>

  <div class="card"><div class="section-title">Presentation</div>
  <ul class="checklist"><li>I only presented solutions for what matters to the customer</li><li>I avoided a "feature dump" and giving too much unnecessary information</li><li>I connected the service directly to the issues they explained are most important to them</li></ul>
  ${ratingBlock('rep',s,'presentation')}</div>

  <div class="card"><div class="section-title">Soft closes</div>
  <ul class="checklist"><li>I asked questions like "How does that sound?"</li><li>I checked for agreement during the conversation</li></ul>
  ${ratingBlock('rep',s,'softCloses')}</div>

  <div class="card"><div class="section-title">Asked for the order</div>
  <ul class="checklist"><li>I clearly asked for the sale</li><li>I did not avoid or delay asking</li></ul>
  ${ratingBlock('rep',s,'askedOrder')}</div>

  <div class="card"><div class="section-title">Objection handling</div>
  <ul class="checklist"><li>I stayed calm and professional</li><li>I asked questions to understand concerns</li><li>I responded with solutions</li><li>I tried to close again after handling objections</li></ul>
  ${ratingBlock('rep',s,'objHandling')}</div>

  <div class="card"><div class="section-title">Call outcomes</div>
  <div class="field-group"><label>Call #1</label><div class="outcome-row">${outcomeRow('rep',s,1)}</div></div>
  <div class="field-group"><label>Call #2</label><div class="outcome-row">${outcomeRow('rep',s,2)}</div></div></div>

  <div class="card"><div class="section-title">Self-reflection</div>
  <div class="field-group"><label>What I did well on these calls</label><textarea oninput="repState.didWell=this.value" placeholder="Describe strengths...">${s.didWell}</textarea></div>
  <div class="field-group"><label>What I will do differently next time</label><textarea oninput="repState.doDiff=this.value" placeholder="Areas to improve...">${s.doDiff}</textarea></div>
  <div class="field-group"><label>Did I ask for the order?</label><div class="yes-no-row">
    <button class="outcome-btn${s.didAsk==='Yes'?' selected':''}" onclick="repState.didAsk='Yes';repState.ifNo='';renderRep()">Yes</button>
    <button class="outcome-btn${s.didAsk==='No'?' selected':''}" onclick="repState.didAsk='No';renderRep()">No</button>
  </div></div>
  ${s.didAsk==='No'?`<div class="field-group"><label>If no, why not?</label><textarea oninput="repState.ifNo=this.value" placeholder="Explain...">${s.ifNo}</textarea></div>`:''}</div>

  <div class="card"><div class="section-title">Commitment</div>
  <div class="field-group"><label>One thing I will improve on my next call</label><textarea oninput="repState.commitment=this.value" placeholder="Your commitment...">${s.commitment}</textarea></div></div>

  <button class="submit-btn" onclick="submitForm('rep')">Submit evaluation</button>`;
}

function renderMg(){
  const s=mgState;
  document.getElementById('mgForm').innerHTML=`<div class="card"><div class="section-title">Manager information</div>
  <div class="two-col">
    <div class="field-group"><label>Manager name</label><input type="text" value="${s.mgrName}" oninput="mgState.mgrName=this.value" placeholder="Full name"></div>
    <div class="field-group"><label>Brand</label><input type="text" value="${s.brand}" oninput="mgState.brand=this.value" placeholder="Brand"></div>
  </div>
  <div class="two-col">
    <div class="field-group"><label>Week of</label><input type="text" value="${s.weekOf}" oninput="mgState.weekOf=this.value" placeholder="MM/DD/YYYY"></div>
    <div class="field-group"><label>Date submitted</label><input type="text" value="${s.dateSubmit}" oninput="mgState.dateSubmit=this.value" placeholder="MM/DD/YYYY"></div>
  </div>
  <div class="field-group"><label>Rep name</label><input type="text" value="${s.repName}" oninput="mgState.repName=this.value" placeholder="Rep's full name"></div>
  <div class="field-group"><label>Call #1 type</label><div class="outcome-row">
    <button class="outcome-btn${s.call1type==='Recorded'?' selected':''}" onclick="mgState.call1type='Recorded';renderMg()">Recorded</button>
    <button class="outcome-btn${s.call1type==='Live Sit-In'?' selected':''}" onclick="mgState.call1type='Live Sit-In';renderMg()">Live sit-in</button>
  </div></div>
  <div class="field-group"><label>Call #2 type</label><div class="outcome-row">
    <button class="outcome-btn${s.call2type==='Recorded'?' selected':''}" onclick="mgState.call2type='Recorded';renderMg()">Recorded</button>
    <button class="outcome-btn${s.call2type==='Live Sit-In'?' selected':''}" onclick="mgState.call2type='Live Sit-In';renderMg()">Live sit-in</button>
  </div></div></div>

  <div class="card"><div class="section-title">Discovery</div>
  <ul class="checklist"><li>"How did you hear about us?"</li><li>"What's prompted you to reach out and contact lawn care providers now?"</li><li>"On a scale of 1–10, one being basically no grass and ten being golf course quality, how would you rate your lawn?"</li><li>"What have you been doing to care for your lawn?"</li></ul>
  ${ratingBlock('mg',s,'discovery')}</div>

  <div class="card"><div class="section-title">Tailored presentation</div>
  <ul class="checklist"><li>Focused only on customer-stated issues</li><li>Avoided generic pitch / feature dump</li><li>Connected service and applications to the specific issues the buyer is most concerned about</li></ul>
  ${ratingBlock('mg',s,'presentation')}</div>

  <div class="card"><div class="section-title">Soft closes</div>
  <ul class="checklist"><li>Asked engagement questions during presentation</li><li>Used phrases like "How does that sound?"</li><li>Confirmed the buyer's understanding and addressed hesitations before moving forward</li></ul>
  ${ratingBlock('mg',s,'softCloses')}</div>

  <div class="card"><div class="section-title">Asked for the order</div>
  <ul class="checklist"><li>Clearly asked for the sale</li><li>Did not hesitate or skip this step</li></ul>
  ${ratingBlock('mg',s,'askedOrder')}</div>

  <div class="card"><div class="section-title">Objection handling</div>
  <ul class="checklist"><li>Acknowledged concern</li><li>Asked follow-up questions to clarify and understand the buyer's perspective</li><li>Responded with relevant solutions</li><li>Asked: "Does that give you the comfort you need to move forward?"</li></ul>
  ${ratingBlock('mg',s,'objHandling')}</div>

  <div class="card"><div class="section-title">Call outcomes</div>
  <div class="field-group"><label>Call #1</label><div class="outcome-row">${outcomeRow('mg',s,1)}</div></div>
  <div class="field-group"><label>Call #2</label><div class="outcome-row">${outcomeRow('mg',s,2)}</div></div></div>

  <div class="card"><div class="section-title">Manager coaching notes</div>
  <div class="field-group"><label>What the rep did well</label><textarea oninput="mgState.didWell=this.value" placeholder="Strengths observed...">${s.didWell}</textarea></div>
  <div class="field-group"><label>1–2 areas to improve</label><textarea oninput="mgState.improve=this.value" placeholder="Areas for improvement...">${s.improve}</textarea></div>
  <div class="field-group"><label>Manager coaching actions to be taken</label><textarea oninput="mgState.coachingActions=this.value" placeholder="Action plan...">${s.coachingActions}</textarea></div></div>

  <button class="submit-btn" onclick="submitForm('manager')">Submit scorecard</button>`;
}

function switchForm(t){
  currentForm=t;
  document.getElementById('repForm').classList.toggle('hidden',t!=='rep');
  document.getElementById('mgForm').classList.toggle('hidden',t!=='manager');
  document.getElementById('repTab').classList.toggle('active',t==='rep');
  document.getElementById('mgTab').classList.toggle('active',t==='manager');
}

function submitForm(type){
  const isRep=type==='rep';
  const s=isRep?repState:mgState;
  const nameVal=isRep?s.name:s.mgrName;
  if(!nameVal||!nameVal.trim()){alert('Please enter a name before submitting.');return;}
  document.getElementById('sendingOverlay').classList.remove('hidden');
  setTimeout(()=>{
    const subs=loadSubmissions();
    const entry={
      id:'sub_'+Date.now(),
      type,
      submittedAt:new Date().toISOString(),
      data:JSON.parse(JSON.stringify(isRep?repState:mgState))
    };
    subs.unshift(entry);
    saveSubmissions(subs);
    document.getElementById('sendingOverlay').classList.add('hidden');
    document.getElementById('formView').classList.add('hidden');
    document.getElementById('successView').classList.remove('hidden');
  },600);
}

function resetAndNew(){
  Object.assign(repState,{name:'',date:'',callType:'',discovery:0,presentation:0,softCloses:0,askedOrder:0,objHandling:0,outcome1:'',outcome2:'',didWell:'',doDiff:'',didAsk:'',ifNo:'',commitment:''});
  Object.assign(mgState,{mgrName:'',brand:'',weekOf:'',repName:'',dateSubmit:'',call1type:'',call2type:'',discovery:0,presentation:0,softCloses:0,askedOrder:0,objHandling:0,outcome1:'',outcome2:'',didWell:'',improve:'',coachingActions:''});
  document.getElementById('formView').classList.remove('hidden');
  document.getElementById('successView').classList.add('hidden');
  renderRep();renderMg();
}

/* SUBMISSIONS LIST */
function filterSubs(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSubsList();
}

function renderSubsList(){
  const subs=loadSubmissions();
  const filtered=currentFilter==='all'?subs:subs.filter(s=>s.type===currentFilter);
  const el=document.getElementById('subsList');
  if(!filtered.length){el.innerHTML=`<div class="empty-state">No submissions yet.</div>`;return;}
  el.innerHTML=filtered.map(s=>{
    const isRep=s.type==='rep';
    const name=isRep?s.data.name:s.data.repName;
    const date=isRep?s.data.date:s.data.weekOf;
    const submitter=isRep?'Rep self-eval':'Manager scorecard';
    const mgr=!isRep&&s.data.mgrName?` · ${s.data.mgrName}`:'';
    const d=new Date(s.submittedAt);
    const ts=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return `<div class="sub-card">
      <div class="sub-info">
        <div class="sub-name">${name||'(No name)'}</div>
        <div class="sub-meta">${date?date+' · ':''}Submitted ${ts}${mgr}</div>
      </div>
      <span class="sub-badge ${isRep?'badge-rep':'badge-mg'}">${submitter}</span>
      <div class="sub-actions">
        <button class="icon-btn" onclick="viewDetail('${s.id}')">View</button>
        <button class="icon-btn" onclick="viewAndDownload('${s.id}')">PDF</button>
        <button class="icon-btn danger" onclick="deleteSub('${s.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function deleteSub(id){
  if(!confirm('Delete this submission? This cannot be undone.'))return;
  const subs=loadSubmissions().filter(s=>s.id!==id);
  saveSubmissions(subs);
  renderSubsList();
}

function viewDetail(id){
  const sub=loadSubmissions().find(s=>s.id===id);
  if(!sub)return;
  currentDetailId=id;
  const isRep=sub.type==='rep';
  const d=sub.data;
  const r=n=>n?`<span class="score-pill">${n}/5 — ${RL[n-1]}</span>`:'<span style="color:#999">Not rated</span>';
  const v=s=>s||'<span style="color:#ccc">—</span>';

  let html='';
  if(isRep){
    document.getElementById('detailTitle').textContent=`Rep self-evaluation — ${d.name||'Unknown'}`;
    html=`
    <div class="card"><div class="section-title">Rep information</div>
      ${row('Rep name',v(d.name))}${row('Date',v(d.date))}${row('Call type',v(d.callType))}
    </div>
    <div class="card"><div class="section-title">Scores</div>
      ${row('Discovery',r(d.discovery))}${row('Presentation',r(d.presentation))}${row('Soft closes',r(d.softCloses))}${row('Asked for the order',r(d.askedOrder))}${row('Objection handling',r(d.objHandling))}
    </div>
    <div class="card"><div class="section-title">Call outcomes</div>
      ${row('Call #1',v(d.outcome1))}${row('Call #2',v(d.outcome2))}
    </div>
    <div class="card"><div class="section-title">Self-reflection</div>
      <div style="margin-bottom:.5rem"><div style="font-size:.8rem;color:#888;margin-bottom:.25rem">What I did well</div><div class="detail-text">${v(d.didWell)}</div></div>
      <div style="margin-bottom:.5rem"><div style="font-size:.8rem;color:#888;margin-bottom:.25rem">What I'll do differently</div><div class="detail-text">${v(d.doDiff)}</div></div>
      ${row('Asked for the order?',v(d.didAsk))}
      ${d.ifNo?`<div><div style="font-size:.8rem;color:#888;margin-bottom:.25rem">If no, why not?</div><div class="detail-text">${d.ifNo}</div></div>`:''}
    </div>
    <div class="card"><div class="section-title">Commitment</div>
      <div class="detail-text">${v(d.commitment)}</div>
    </div>`;
  } else {
    document.getElementById('detailTitle').textContent=`Manager scorecard — ${d.repName||'Unknown rep'}`;
    html=`
    <div class="card"><div class="section-title">Manager information</div>
      ${row('Manager',v(d.mgrName))}${row('Brand',v(d.brand))}${row('Week of',v(d.weekOf))}${row('Rep name',v(d.repName))}${row('Date submitted',v(d.dateSubmit))}${row('Call #1 type',v(d.call1type))}${row('Call #2 type',v(d.call2type))}
    </div>
    <div class="card"><div class="section-title">Scores</div>
      ${row('Discovery',r(d.discovery))}${row('Presentation',r(d.presentation))}${row('Soft closes',r(d.softCloses))}${row('Asked for the order',r(d.askedOrder))}${row('Objection handling',r(d.objHandling))}
    </div>
    <div class="card"><div class="section-title">Call outcomes</div>
      ${row('Call #1',v(d.outcome1))}${row('Call #2',v(d.outcome2))}
    </div>
    <div class="card"><div class="section-title">Coaching notes</div>
      <div style="margin-bottom:.75rem"><div style="font-size:.8rem;color:#888;margin-bottom:.25rem">What the rep did well</div><div class="detail-text">${v(d.didWell)}</div></div>
      <div style="margin-bottom:.75rem"><div style="font-size:.8rem;color:#888;margin-bottom:.25rem">1–2 areas to improve</div><div class="detail-text">${v(d.improve)}</div></div>
      <div><div style="font-size:.8rem;color:#888;margin-bottom:.25rem">Coaching actions to be taken</div><div class="detail-text">${v(d.coachingActions)}</div></div>
    </div>`;
  }
  document.getElementById('detailBody').innerHTML=html;
  showPage('detail');
}

function row(k,v){return `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`;}

function viewAndDownload(id){viewDetail(id);setTimeout(()=>downloadPDF(),200);}

function downloadPDF(){
  const sub=loadSubmissions().find(s=>s.id===currentDetailId);
  if(!sub)return;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'letter'});
  const isRep=sub.type==='rep';
  const d=sub.data;
  const green=[30,77,43];
  const gray=[100,100,100];
  const dark=[26,26,26];
  let y=50;
  const lh=18, pad=50, w=doc.internal.pageSize.getWidth()-pad*2;

  function checkPage(needed=lh*2){if(y+needed>730){doc.addPage();y=50;}}
  function heading(txt){
    checkPage(30);
    doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.setTextColor(...green);
    doc.text(txt.toUpperCase(),pad,y);
    doc.setDrawColor(...green);doc.setLineWidth(.5);
    doc.line(pad,y+4,pad+w,y+4);
    y+=20;
  }
  function field(label,val){
    checkPage(lh+10);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...gray);
    doc.text(label,pad,y);
    doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(...dark);
    const lines=doc.splitTextToSize(val||'—',w);
    doc.text(lines,pad+160,y);
    y+=Math.max(lh,lines.length*13);
  }
  function textBlock(label,val){
    checkPage(lh*3);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...gray);doc.text(label,pad,y);y+=13;
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...dark);
    const lines=doc.splitTextToSize(val||'—',w);
    lines.forEach(l=>{checkPage();doc.text(l,pad,y);y+=13;});
    y+=6;
  }
  function score(label,n){field(label,n?`${n}/5 — ${RL[n-1]}`:'-');}

  // Header
  doc.setFillColor(...green);doc.rect(0,0,doc.internal.pageSize.getWidth(),36,'F');
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('LAWN PRO PARTNERS',pad,16);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(isRep?'Rep Self-Evaluation — Sales Call Scorecard':'Manager Weekly Rep Call Coaching Scorecard',pad,28);
  const ts=new Date(sub.submittedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  doc.text('Submitted: '+ts,doc.internal.pageSize.getWidth()-pad,28,{align:'right'});
  y=60;

  if(isRep){
    heading('Rep information');
    field('Rep name',d.name);field('Date',d.date);field('Call type',d.callType);
    heading('Scores');
    score('Discovery',d.discovery);score('Presentation',d.presentation);score('Soft closes',d.softCloses);score('Asked for the order',d.askedOrder);score('Objection handling',d.objHandling);
    heading('Call outcomes');
    field('Call #1',d.outcome1);field('Call #2',d.outcome2);
    heading('Self-reflection');
    textBlock('What I did well',d.didWell);textBlock('What I\'ll do differently',d.doDiff);
    field('Asked for the order?',d.didAsk);
    if(d.ifNo)textBlock('If no, why not?',d.ifNo);
    heading('Commitment');
    textBlock('One thing I will improve',d.commitment);
  } else {
    heading('Manager information');
    field('Manager name',d.mgrName);field('Brand',d.brand);field('Week of',d.weekOf);field('Rep name',d.repName);field('Date submitted',d.dateSubmit);field('Call #1 type',d.call1type);field('Call #2 type',d.call2type);
    heading('Scores');
    score('Discovery',d.discovery);score('Presentation',d.presentation);score('Soft closes',d.softCloses);score('Asked for the order',d.askedOrder);score('Objection handling',d.objHandling);
    heading('Call outcomes');
    field('Call #1',d.outcome1);field('Call #2',d.outcome2);
    heading('Coaching notes');
    textBlock('What the rep did well',d.didWell);textBlock('1–2 areas to improve',d.improve);textBlock('Coaching actions to be taken',d.coachingActions);
  }

  const fname=isRep?`rep-eval-${d.name||'unknown'}-${d.date||'nodate'}.pdf`:`mgr-scorecard-${d.repName||'unknown'}-${d.weekOf||'nodate'}.pdf`;
  doc.save(fname.replace(/\s+/g,'_').replace(/\//g,'-'));
}

/* ADMIN */
function requireAdmin(page){
  if(adminUnlocked){showPage(page);if(page==='subs')renderSubsList();}
  else{
    openAdmin(page);
  }
}
let pendingPage=null;
function openAdmin(targetPage){
  pendingPage=targetPage||null;
  document.getElementById('adminModal').classList.remove('hidden');
  document.getElementById('adminLoginSection').classList.remove('hidden');
  document.getElementById('adminSettingsSection').classList.add('hidden');
  document.getElementById('adminPwError').classList.add('hidden');
  document.getElementById('adminPwInput').value='';
  if(adminUnlocked){
    document.getElementById('adminLoginSection').classList.add('hidden');
    document.getElementById('adminSettingsSection').classList.remove('hidden');
    document.getElementById('adminEmailInput').value=settings.email;
    document.getElementById('adminSaveMsg').classList.add('hidden');
  }
}
function closeAdmin(){
  document.getElementById('adminModal').classList.add('hidden');
}
function checkAdminPw(){
  if(document.getElementById('adminPwInput').value===settings.pw){
    adminUnlocked=true;
    document.getElementById('adminPwError').classList.add('hidden');
    if(pendingPage){closeAdmin();showPage(pendingPage);if(pendingPage==='subs')renderSubsList();pendingPage=null;}
    else{
      document.getElementById('adminLoginSection').classList.add('hidden');
      document.getElementById('adminSettingsSection').classList.remove('hidden');
      document.getElementById('adminEmailInput').value=settings.email;
      document.getElementById('adminSaveMsg').classList.add('hidden');
    }
  } else {
    document.getElementById('adminPwError').classList.remove('hidden');
  }
}
function saveAdminSettings(){
  const email=document.getElementById('adminEmailInput').value.trim();
  if(!email.includes('@')){document.getElementById('adminEmailError').classList.remove('hidden');return;}
  document.getElementById('adminEmailError').classList.add('hidden');
  settings.email=email;
  const np=document.getElementById('adminNewPw').value.trim();
  if(np)settings.pw=np;
  saveSettings();
  document.getElementById('adminSaveMsg').classList.remove('hidden');
  document.getElementById('adminNewPw').value='';
}

function showPage(p){
  ['form','subs','detail'].forEach(n=>document.getElementById('page'+n.charAt(0).toUpperCase()+n.slice(1)).classList.add('hidden'));
  document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.remove('hidden');
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('active'));
  if(p==='form')document.getElementById('navForm').classList.add('active');
  if(p==='subs')document.getElementById('navSubs').classList.add('active');
}

document.getElementById('adminModal').addEventListener('click',function(e){if(e.target===this)closeAdmin();});

renderRep();renderMg();
</script>
